<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>松鼠逛逛 · 社区生活服务</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 天地图 API (使用您的密钥) -->
    <script type="text/javascript" src="https://api.tianditu.gov.cn/api?v=4.0&tk=0a38cebb8893c8ae603090f97803e3af"></script>
</head>
<body>
    <div class="container">
        <!-- 左侧固定菜单 -->
<aside class="sidebar">
    <div class="logo-area">
        <img src="images/logo.png" alt="松鼠逛逛" class="logo-img">
        <span class="logo-text">松鼠逛逛</span>
        <span class="slogan-inline">——社区生活服务平台</span>
    </div>
    <nav>   
             <ul>
                    <li class="menu-item active" data-target="intro">平台简介</li>
                    <li class="menu-item" data-target="news">平台要闻</li>
                    <li class="menu-item" data-target="supplier">供应商入驻</li>
                    <li class="menu-item" data-target="merchant">商家入驻</li>
                    <li class="menu-item" data-target="contact">联系方式</li>
                </ul>
            </nav>
        </aside>

        <!-- 右侧主要内容区域 -->
        <main class="content" id="content-area">
            <!-- 平台简介 -->
            <div id="intro" class="page active">
    <h2>平台简介</h2>
    <div id="intro-content"></div>
</div>

            <!-- 平台要闻 (动态加载) -->
            <div id="news" class="page">
                <h2>平台要闻</h2>
                <div id="news-list"></div>
            </div>

            <!-- 供应商入驻表单 -->
            <div id="supplier" class="page">
                <h2>供应商入驻</h2>
                <form id="supplierForm">
                    <label>店铺名称 <input type="text" name="shopName" required></label>
                    <label>联系人电话 <input type="tel" name="contactPhone" required></label>
                    <label>联系人姓名 <input type="text" name="contactName" required></label>
                    <div class="address-group">
                        <label>省市区</label>
                        <select id="supplierProvince" name="province" required></select>
                        <select id="supplierCity" name="city" required></select>
                        <select id="supplierDistrict" name="district" required></select>
                    </div>
                    <label>详细地址 <input type="text" name="detailAddress" required></label>
                    <button type="button" class="map-pick-btn" data-form="supplier">📍 地图选点</button>
                    <button type="submit" class="submit-btn">提交入驻申请</button>
                </form>
            </div>

            <!-- 商家入驻表单 -->
            <div id="merchant" class="page">
                <h2>商家入驻</h2>
                <form id="merchantForm">
                    <label>店铺名称 <input type="text" name="shopName" required></label>
                    <label>联系人电话 <input type="tel" name="contactPhone" required></label>
                    <label>联系人姓名 <input type="text" name="contactName" required></label>
                    <div class="address-group">
                        <label>省市区</label>
                        <select id="merchantProvince" name="province" required></select>
                        <select id="merchantCity" name="city" required></select>
                        <select id="merchantDistrict" name="district" required></select>
                    </div>
                    <label>详细地址 <input type="text" name="detailAddress" required></label>
                    <button type="button" class="map-pick-btn" data-form="merchant">📍 地图选点</button>
                    <button type="submit" class="submit-btn">提交入驻申请</button>
                </form>
            </div>

            <!-- 平台联系方式 -->
            <div id="contact" class="page">
                <h2>平台联系方式</h2>
                <p>📞 电话：<strong>023-65180956</strong>  </p>

                <p>🔗 网址：<strong>https://hsyg.pages.dev</strong>  </p>

                <p>🏢 地址：<strong>重庆市沙坪坝区南希经济园46号</strong>  </p>

                <p>⏰ 服务时间：周一至周日 8:30 - 22:00</strong></p>
                <!-- 二维码区域 -->
<div class="qrcode-section">
    <h3>扫码关注我们</h3>
    <div class="qrcode-grid">
        <div class="qrcode-item">
            <img src="images/qrcode_gzh.png" alt="松鼠逛逛公众号" class="qrcode-img">
            <span>公众号</span>
        </div>
        <div class="qrcode-item">
            <img src="images/qrcode_mini.png" alt="松鼠逛逛小程序" class="qrcode-img">
            <span>小程序</span>
        </div>
        <div class="qrcode-item">
            <img src="images/qrcode_user.png" alt="松鼠逛逛用户端" class="qrcode-img">
            <span>用户端</span>
        </div>
        <div class="qrcode-item">
            <img src="images/qrcode_merchant.png" alt="松鼠逛逛商家端" class="qrcode-img">
            <span>商家端</span>
        </div>
    </div>
</div>
            </div>
        </main>
    </div>

    <!-- 地图选点弹窗 -->
<div id="mapModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div class="button-group">
            <input type="text" id="searchAddress" placeholder="输入地址搜索">
            <button id="searchBtn" style="background:#3498db; color:white; border:none; border-radius:8px; cursor:pointer;">搜索</button>
            <button id="locateBtn" style="background:#27ae60; color:white; border:none; border-radius:8px; cursor:pointer;">📍 定位</button>
        </div>
        <div id="mapContainer" style="width:100%; height:400px;"></div>
        <p>点击地图上的位置，系统将自动填充省市区及详细地址</p>
    </div>
</div>

    <script src="js/tianmap.js"></script>
    <script src="js/main.js?v=20260320"></script>
</body>
</html>
